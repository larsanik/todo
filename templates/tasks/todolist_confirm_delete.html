{% extends 'base.html' %}

{% block content %}
<h3>Удаление списка</h3>
<p>Вы уверены, что хотите удалить список {{ object.title }}?</p>
<form method="post">
    {% csrf_token %}
    <input value="Удалить" type="submit">
    <input value="Отмена" type="button" onclick="location.href='{% url "index" %}'">
</form>
{% endblock %}
