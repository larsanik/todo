{% extends 'base.html' %}

{% block content %}
<h3> {{ title }} </h3>
<form method="post">
    {% csrf_token %}
    <table>
        {{ form.as_table }}
    </table>
    <input value="Создать" type="submit">
    <input value="Отмена" type="button" onclick="location.href='{% url "list" todo_list.id %}'">
    {% if object %}
        <input value="Удалить" type="button" onclick="location.href='{% url "item-delete" todo_list.id object.id %}'">
    {% endif %}
</form>
{% endblock %}
