{% extends 'base.html' %}

{% block content %}
<h3>Удаление задачи</h3>
<p>Вы уверены, что хотите удалить задачу {{ object.title }} из списка {{ todo_list.title }}?</p>
<form method="post">
    {% csrf_token %}
    <input value="Удалить" type="submit">
    <input value="Отмена" type="button" onclick="location.href='{% url "list" todo_list.id %}'">
</form>
{% endblock %}
